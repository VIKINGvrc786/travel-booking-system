<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRAVEL1 | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; background: #2c3e50; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 14px; cursor: pointer; color: #3498db; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2 id="auth-title">Login to TRAVEL1</h2>
        <form id="authForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn" id="authBtn">Login</button>
        </form>
        <div class="toggle-link" onclick="toggleAuth()" id="toggleText">New User? Register here.</div>
    </div>

    <script>
        let isLogin = true;
       const API_URL = 'https://travel-backend-oh36.onrender.com/api';

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Login to TRAVEL1' : 'Create Account';
            document.getElementById('authBtn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('toggleText').innerText = isLogin ? 'New User? Register here.' : 'Already have an account? Login.';
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const endpoint = isLogin ? '/auth/login' : '/auth/register';

            const res = await fetch(`${API_URL}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('userId', data.userId);
                localStorage.setItem('userEmail', email); // For booking auto-fill
                window.location.href = 'booking.html';
            } else {
                alert(data.error || "Authentication failed");
            }
        });
    </script>
</body>
</html>
