<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Travel System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hero">
        <div class="form-container" style="background: white; padding: 40px; border-radius: 8px;">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="email" id="email" placeholder="e.g., varun@example.com" required style="display:block; margin: 10px 0; padding: 10px;"><br>
                <input type="password" id="password" placeholder="Password" required style="display:block; margin: 10px 0; padding: 10px;"><br>
                <button type="submit" class="cta-button">Login</button>
            </form>
            <p id="loginMessage" style="margin-top: 15px; color: red;"></p>
        </div>
    </div>
    <script src="js/api.js"></script>
</body>
</html>
