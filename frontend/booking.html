<script>
    // ... (Keep your existing dests and updateRoutes)

    function generatePaxFields() {
        const container = document.getElementById('passengerContainer');
        const adults = parseInt(document.getElementById('adultCount').value);
        const children = parseInt(document.getElementById('childCount').value);
        container.innerHTML = "<h4>Passenger Details</h4>";

        for(let i=1; i <= (adults + children); i++) {
            const type = i <= adults ? "Adult" : "Child";
            container.innerHTML += `
                <div class="pax-card">
                    <strong>Passenger ${i} (${type})</strong>
                    <div class="grid">
                        <input type="text" class="pax-name" placeholder="Full Name" required>
                        <input type="number" class="pax-age" placeholder="Age" required>
                    </div>
                    <select class="pax-meal">
                        <option value="Veg">🥗 Veg Meal</option>
                        <option value="Non-Veg">🍗 Non-Veg Meal</option>
                        <option value="None">🚫 No Meal</option> 
                    </select>
                </div>`;
        }
    }

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('mainBtn');
        btn.innerText = "Cloud Sync in Progress...";
        btn.disabled = true; // Prevent double clicking
        
        try {
            const paxElements = document.getElementsByClassName('pax-card');
            let passengers = [];
            for (let card of paxElements) {
                passengers.push({
                    name: card.querySelector('.pax-name').value,
                    age: card.querySelector('.pax-age').value,
                    meal: card.querySelector('.pax-meal').value
                });
            }

            const payload = {
                userId: localStorage.getItem('userId') || "GUEST_USER",
                passengers,
                contactEmail: document.getElementById('contactEmail').value,
                phone: document.getElementById('phone').value,
                source: document.getElementById('source').value,
                destination: document.getElementById('destination').value,
                transportType: document.getElementById('transportType').value,
                hotelStay: document.getElementById('hotelStay').value,
                date: document.getElementById('date').value
            };

            const res = await fetch(`${API_URL}/bookings/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) throw new Error('Server responded with an error');

            const data = await res.json();
            btn.style.display = 'none';
            document.getElementById('status').style.display = 'block';
            const dl = document.getElementById('downloadBtn');
            dl.href = data.ticketUrl;
            dl.style.display = 'block';

        } catch (err) {
            console.error(err);
            btn.innerText = "Sync Failed - Try Again";
            btn.disabled = false;
            alert("Booking Failed. Check if Render is still 'Live'.");
        }
    });
</script>
