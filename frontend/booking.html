<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRAVEL1 | Booking Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; padding: 50px 10%; }
        .booking-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 20px; }
        #downloadBtn { display: none; background: #2c3e50; text-align: center; color: white; padding: 15px; text-decoration: none; border-radius: 8px; display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="booking-card">
        <h2>Cloud Booking Engine</h2>
        <form id="bookingForm">
            <div class="grid">
                <input type="text" id="passengerName" placeholder="Full Name" required>
                <input type="email" id="contactEmail" placeholder="Contact Email" required>
            </div>
            <div class="grid">
                <input type="text" id="phone" placeholder="Phone Number (e.g., +91...)" required>
                <input type="date" id="date" required>
            </div>
            <div class="grid">
                <input type="text" id="source" placeholder="Origin City" required>
                <input type="text" id="destination" placeholder="Destination City" required>
            </div>
            <div class="grid">
                <input type="number" id="adults" placeholder="No. of Adults" min="1" required>
                <input type="number" id="children" placeholder="No. of Children" min="0" required>
            </div>
            <select id="transportType">
                <option value="Flight">✈️ Flight</option>
                <option value="Train">🚆 Train</option>
                <option value="Cab">🚗 Private Cab</option>
            </select>
            <select id="foodPref">
                <option value="Veg">🥗 Veg Meal</option>
                <option value="Non-Veg">🍗 Non-Veg Meal</option>
            </select>
            <button type="submit" class="btn" id="submitBtn">Confirm Booking & Sync Cloud</button>
        </form>
        
        <div id="statusMsg" style="text-align: center; display: none; color: #27ae60; margin-top: 15px;">
            📧 Booking Confirmed! A confirmation email has been sent to your inbox.
        </div>
        <a id="downloadBtn" href="#" target="_blank">✅ Download VIKING Boarding Pass</a>
    </div>

    <script>
        const API_URL = 'https://travel-backend-oh36.onrender.com/api';
        
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing Cloud Sync...";

            const payload = {
                userId: localStorage.getItem('userId'),
                passengerName: document.getElementById('passengerName').value,
                contactEmail: document.getElementById('contactEmail').value,
                phone: document.getElementById('phone').value,
                source: document.getElementById('source').value,
                destination: document.getElementById('destination').value,
                adults: document.getElementById('adults').value,
                children: document.getElementById('children').value,
                transportType: document.getElementById('transportType').value,
                foodPref: document.getElementById('foodPref').value,
                date: document.getElementById('date').value
            };

            const res = await fetch(`${API_URL}/bookings/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (res.ok) {
                btn.style.display = 'none';
                document.getElementById('statusMsg').style.display = 'block';
                const dBtn = document.getElementById('downloadBtn');
                dBtn.href = data.ticketUrl;
                dBtn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
