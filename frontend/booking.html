<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TRAVEL1 | Cloud Booking Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f6; margin: 0; padding-top: 80px; }
        nav { background: #2c3e50; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; top: 0; z-index: 1000; }
        nav h1 { color: white; margin: 0; text-decoration: none; }
        .glass-card { background: white; max-width: 600px; margin: 40px auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, select { width:100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn-confirm { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 16px; margin-top: 10px; }
        
        /* THE BIG DOWNLOAD BUTTON */
        .download-btn { 
            display: none; 
            margin-top: 30px; 
            background: #2c3e50; 
            color: white; 
            text-align: center; 
            padding: 20px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 600; 
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .download-btn:hover { background: #34495e; transform: translateY(-3px); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" style="text-decoration:none;"><h1>TRAVEL<span>1</span></h1></a>
    </nav>

    <div class="glass-card">
        <h2 style="text-align: center;">Cloud Booking Engine</h2>
        <form id="bookingForm">
            <input type="text" id="passengerName" placeholder="Passenger Full Name" required>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="source" placeholder="Origin City" required>
                <input type="text" id="destination" placeholder="Destination City" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <select id="transportType">
                    <option value="Flight">✈️ Flight</option>
                    <option value="Train">🚆 Express Train</option>
                    <option value="Cab">🚗 Private Cab</option>
                </select>
                <select id="foodPref">
                    <option value="Veg">🥗 Pure Veg</option>
                    <option value="Non-Veg">🍗 Non-Veg</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <select id="stayDuration">
                    <option value="1 Night">🌙 1 Night Stay</option>
                    <option value="3 Nights">🌙 3 Nights Stay</option>
                    <option value="5 Nights">🌙 5 Nights Stay</option>
                </select>
                <input type="date" id="date" required>
            </div>
            <button type="submit" class="btn-confirm">Confirm Booking</button>
        </form>

        <a id="downloadLink" href="#" target="_blank" class="download-btn">
            ✅ SUCCESS: DOWNLOAD E-TICKET
        </a>
    </div>

    <script>
        const API_URL = 'https://travel-backend-oh36.onrender.com/api';
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Processing Cloud Sync...";
            
            const payload = {
                userId: "GUEST_VARUN", // Simplified for fast execution
                passengerName: document.getElementById('passengerName').value,
                source: document.getElementById('source').value,
                destination: document.getElementById('destination').value,
                transportType: document.getElementById('transportType').value,
                foodPref: document.getElementById('foodPref').value,
                stayDuration: document.getElementById('stayDuration').value,
                date: document.getElementById('date').value
            };

            const res = await fetch(`${API_URL}/bookings/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (res.ok) {
                btn.style.display = 'none';
                const dwnBtn = document.getElementById('downloadLink');
                dwnBtn.href = data.ticketUrl;
                dwnBtn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
