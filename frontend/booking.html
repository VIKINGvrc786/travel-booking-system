<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book a Trip</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hero">
        <div class="form-container" style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
            <h2 style="text-align: center; margin-bottom: 20px;">Book Your Trip</h2>
            <form id="bookingForm">
                <input type="text" id="passengerName" placeholder="Full Name" required style="display:block; margin: 10px 0; padding: 12px; width: 100%; border: 1px solid #ccc; border-radius: 4px;">
                <input type="text" id="source" placeholder="From (e.g., Mumbai)" required style="display:block; margin: 10px 0; padding: 12px; width: 100%; border: 1px solid #ccc; border-radius: 4px;">
                <input type="text" id="destination" placeholder="To (e.g., Dubai, Japan)" required style="display:block; margin: 10px 0; padding: 12px; width: 100%; border: 1px solid #ccc; border-radius: 4px;">
                <input type="date" id="date" required style="display:block; margin: 10px 0; padding: 12px; width: 100%; border: 1px solid #ccc; border-radius: 4px;">
                <button type="submit" class="cta-button" style="width: 100%; padding: 12px; cursor: pointer;">Confirm Booking</button>
            </form>
            
            <div id="result" style="margin-top: 20px; display: none; text-align: center;">
                <h3 style="color: green;">Booking Successful!</h3>
                <a id="downloadLink" href="#" target="_blank" class="cta-button" style="background: #28a745; display: inline-block; padding: 12px 20px; text-decoration: none; color: white; border-radius: 4px; margin-top: 10px;">Download E-Ticket (AWS S3)</a>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
</body>
</html>
